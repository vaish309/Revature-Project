<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Welcome Back</h2>

    <p class="login-subtitle">Login to your RevHire account</p>

    <div *ngIf="errorMessage" class="alert-error">{{ errorMessage }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="credentials.email"
          required
          placeholder="Enter your email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="credentials.password"
          required
          placeholder="Enter your password"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="register-links">
      <p>Don't have an account?</p>
      <a routerLink="/register/jobseeker" class="btn-secondary">Register as Job Seeker</a>
      <a routerLink="/register/employer" class="btn-tertiary">Register as Employer</a>
    </div>
  </div>
</div>
