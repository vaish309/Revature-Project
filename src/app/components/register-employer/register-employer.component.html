<div class="page-wrapper">

  <div class="register-card">

    <div class="card-header">
      <h2>Create Employer Account</h2>
      <p>Post jobs and hire top candidates easily</p>
    </div>

    @if (errorMessage) {
      <div class="alert-box">{{ errorMessage }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="form-grid">

      <!-- Personal Info -->
      <div class="section-title full-width">Personal Information</div>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name"
               [(ngModel)]="formData.name" required />
      </div>

      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email"
               [(ngModel)]="formData.email" required />
      </div>

      <div class="form-group">
        <label>Password *</label>
        <input type="password" name="password"
               [(ngModel)]="formData.password" required />
      </div>

      <div class="form-group">
        <label>Phone *</label>
        <input type="tel" name="phone"
               [(ngModel)]="formData.phone" required />
      </div>

      <!-- Company Info -->
      <div class="section-title full-width">Company Information</div>

      <div class="form-group">
        <label>Company Name *</label>
        <input type="text" name="companyName"
               [(ngModel)]="formData.companyName" required />
      </div>

      <div class="form-group">
        <label>Industry *</label>
        <input type="text" name="industry"
               [(ngModel)]="formData.industry" required />
      </div>

      <div class="form-group full-width">
        <label>Description *</label>
        <textarea rows="3"
                  name="description"
                  [(ngModel)]="formData.description"
                  required></textarea>
      </div>

      <div class="form-group">
        <label>Website</label>
        <input type="url" name="website"
               [(ngModel)]="formData.website" />
      </div>

      <div class="form-group">
        <label>Location *</label>
        <input type="text" name="location"
               [(ngModel)]="formData.location" required />
      </div>

      <div class="form-group full-width">
        <label>Company Size *</label>
        <input type="number" name="companySize"
               [(ngModel)]="formData.companySize"
               min="1" required />
      </div>

      <button type="submit"
              class="primary-btn full-width"
              [disabled]="loading">
        {{ loading ? 'Creating...' : 'Register Employer' }}
      </button>

      <div class="login-text full-width">
        Already have an account?
        <a routerLink="/login">Login</a>
      </div>

    </form>

  </div>

</div>
